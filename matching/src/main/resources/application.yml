server:
  port: 8084

spring:
  application:
    name: matching
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:larder}?currentSchema=matching_service
    username: ${POSTGRES_USER:larder_app}
    password: ${POSTGRES_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: matching_service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
