server:
  port: 8080

# Không dùng service registry: mỗi service có đúng 1 instance, địa chỉ do Docker DNS
# (hoặc localhost khi chạy bằng mvnw) phân giải. Route khai báo tường minh bên dưới.
# Prefix "<tên>-service" là API công khai; StripPrefix=1 để service chỉ thấy "/api/v1/...".
spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates: [Path=/user-service/**]
          filters: [StripPrefix=1]
        - id: inventory
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8082}
          predicates: [Path=/inventory-service/**]
          filters: [StripPrefix=1]
        - id: recipe
          uri: ${RECIPE_SERVICE_URL:http://localhost:8083}
          predicates: [Path=/recipe-service/**]
          filters: [StripPrefix=1]
        - id: matching
          uri: ${MATCHING_SERVICE_URL:http://localhost:8084}
          predicates: [Path=/matching-service/**]
          filters: [StripPrefix=1]
        - id: rag
          uri: ${RAG_SERVICE_URL:http://localhost:8085}
          predicates: [Path=/rag-service/**]
          filters: [StripPrefix=1]
        - id: image
          uri: ${IMAGE_SERVICE_URL:http://localhost:8086}
          predicates: [Path=/image-service/**]
          filters: [StripPrefix=1]
        - id: payment
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8087}
          predicates: [Path=/payment-service/**]
          filters: [StripPrefix=1]
