server:
  port: 8087

spring:
  application:
    name: payment
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:larder}?currentSchema=payment_service
    username: ${POSTGRES_USER:larder_app}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment_service
