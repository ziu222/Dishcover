services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: larder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-larder}
      POSTGRES_USER: ${POSTGRES_USER:-larder_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    ports:
      - "5432:5432"
    networks:
      - private-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-larder_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: larder-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-larder_app}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-recipe_matcher_db}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - private-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  # public-net: chỉ API Gateway gắn vào đây khi service được scaffold (Phần I mục "Nguyên tắc bắt buộc")
  public-net:
    driver: bridge
  private-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
